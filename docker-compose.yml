services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  infra:
    build:
      context: ./infra
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      MONGO_URI: mongodb://mongo:27017/webhooks
      PORT: '3000'
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
